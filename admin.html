<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin - Benis Burguer</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:#121212;
color:white;
font-family:Poppins,sans-serif;
padding:30px;
}

h1{
margin-bottom:20px;
}

.dashboard{
display:flex;
gap:30px;
margin-bottom:40px;
flex-wrap:wrap;
}

.card-metric{
background:#1e1e1e;
padding:20px;
border-radius:10px;
min-width:200px;
}

#orders{
display:flex;
flex-direction:column;
gap:20px;
}

.admin-card{
background:#1e1e1e;
padding:20px;
border-radius:10px;
}

.status{
font-weight:bold;
padding:5px 10px;
border-radius:20px;
display:inline-block;
}

.status-Recebido{background:orange;}
.status-Em\ preparo{background:#3498db;}
.status-Saiu\ para\ entrega{background:#9b59b6;}
.status-Finalizado{background:#2ecc71;}

button{
margin:5px 5px 5px 0;
padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
background:#ff4d00;
color:white;
}

select{
padding:5px;
margin-top:5px;
}
</style>

</head>
<body>

<h1>🍔 Painel Administrativo</h1>

<div class="dashboard">
<div class="card-metric">
<h3>Total de Vendas</h3>
<p id="totalSales">R$ 0.00</p>
</div>

<div class="card-metric">
<h3>Total de Pedidos</h3>
<p id="totalOrders">0</p>
</div>

<div style="flex:1">
<canvas id="salesChart"></canvas>
</div>
</div>

<audio id="notification-sound">
<source src="https://www.soundjay.com/buttons/sounds/beep-07.mp3">
</audio>

<h2>Pedidos</h2>
<div id="orders"></div>

<script src="admin.js"></script>
</body>
</html>
