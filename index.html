<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Benis Burguer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/4b8b59b6f0.js" crossorigin="anonymous"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<img src="logo.png" alt="Benis Burguer">
</div>

<!-- LOGIN / CADASTRO -->
<div id="auth-screen" style="display:none;">
<div class="login-box">

<h2 id="auth-title">Entrar</h2>

<input type="text" id="auth-name" placeholder="Seu nome" style="display:none;">
<input type="email" id="auth-email" placeholder="Seu email">
<input type="password" id="auth-pass" placeholder="Senha">

<button onclick="handleAuth()" id="auth-btn">Entrar</button>

<p id="toggle-auth" onclick="toggleAuth()">
Não tem conta? Cadastre-se
</p>

</div>
</div>

<!-- APP -->
<div id="app">

<!-- HEADER -->
<header class="topbar">

<div class="logo-area">

<img src="logo.png" class="logo" alt="logo">

<div class="store-info">
<h1>Benis Burguer</h1>
<p>🍔 Delivery • Terça a Domingo • 19h às 23h59</p>
</div>

</div>

<div id="user-info"></div>

<div class="social-icons">

<a href="https://www.instagram.com/obenisburguer?igsh=MTBpaWl5NnY2bzBheA==" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://wa.me/5569993668336" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

</div>

</header>

<!-- BANNER -->
<section class="banner">

<div class="banner-content">

<h2>🔥 Chapa quente, sabor único</h2>
<p>Hambúrguer artesanal feito na hora</p>

</div>

</section>

<!-- CARDÁPIO -->
<section class="menu">

<h2 class="menu-title">🍔 Cardápio</h2>

<div id="products"></div>

</section>

<!-- BOTÃO CARRINHO -->
<div class="cart-btn" onclick="toggleCart()">
<i class="fas fa-shopping-cart"></i>
<span id="cart-count">0</span>
</div>

<!-- PAINEL DO CARRINHO -->
<div class="cart-panel" id="cart-panel">

<h2>Seu Pedido</h2>

<input type="text" id="cupom" placeholder="Cupom de desconto">
<button onclick="applyCoupon()">Aplicar Cupom</button>

<div id="cart-items"></div>

<div class="cart-total">
Total: R$ <span id="total">0,00</span>
</div>

<button class="checkout-btn" onclick="checkout()">Finalizar pedido</button>

<hr>

<h3>📜 Histórico de Pedidos</h3>
<div id="history"></div>

</div>

<!-- WHATSAPP FLUTUANTE -->
<a href="https://wa.me/5569993668336" class="whatsapp-float" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<script src="script.js"></script>

</div>

</body>
</html>
