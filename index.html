<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Benis Burguer</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header>

<h1>🍔 Benis Burguer</h1>

<div class="icons">

<a target="_blank"
href="https://www.instagram.com/obenisburguer?igsh=MWJjYnBobzYya2hlcw==">
<i class="fab fa-instagram"></i>
</a>

<a target="_blank"
href="https://wa.me/556993668336">
<i class="fab fa-whatsapp"></i>
</a>

</div>

</header>

<section class="status">

<h2 id="status"></h2>
<p id="timer"></p>

</section>

<section class="menu">

<h2>Cardápio</h2>

<div class="grid">

<div class="card">

<img src="images/xburguer.jpg">

<h3>X-Burguer</h3>

<p>Hambúrguer, queijo, presunto, alface, tomate</p>

<span>R$13</span>

<button onclick="add('X-Burguer',13)">
Adicionar
</button>

</div>


<div class="card">

<img src="images/xsalada.jpg">

<h3>X-Salada</h3>

<span>R$14</span>

<button onclick="add('X-Salada',14)">
Adicionar
</button>

</div>


<div class="card">

<img src="images/xtudo.jpg">

<h3>X-Tudo</h3>

<span>R$23</span>

<button onclick="add('X-Tudo',23)">
Adicionar
</button>

</div>


<div class="card">

<img src="images/batata.jpg">

<h3>Batata Frita</h3>

<span>R$15</span>

<button onclick="add('Batata',15)">
Adicionar
</button>

</div>

</div>

</section>

<div class="cart-btn" onclick="toggleCart()">

🛒
<span id="cart-count">0</span>

</div>

<div class="cart" id="cart">

<h2>Seu Pedido</h2>

<ul id="cart-items"></ul>

<h3>Total: R$ <span id="total">0</span></h3>

<button onclick="pix()">
Pagar com Pix
</button>

</div>

<section class="map">

<h2>Localização</h2>

<p>R. Paulo Fortes, 6245 - Aponiã, Porto Velho - RO</p>

<iframe
src="https://maps.google.com/maps?q=R.%20Paulo%20Fortes%206245%20Porto%20Velho&t=&z=15&ie=UTF8&iwloc=&output=embed">
</iframe>

</section>

<section class="reviews">

<h2>Avaliações</h2>

<input id="name" placeholder="Seu nome">

<textarea id="msg"
placeholder="Seu comentário">
</textarea>

<button onclick="review()">Enviar</button>

<div id="reviews"></div>

</section>

<footer>

© Benis Burguer

</footer>

<script src="script.js"></script>

</body>
</html>
