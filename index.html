<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benis Burguer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/4b8b59b6f0.js" crossorigin="anonymous"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="header-left">
        <img src="logo.png" class="logo">
        <div>
            <h1>Benis Burguer</h1>
            <p>🍔 Somente Delivery • Terça a Domingo 19:00 às 23h59</p>
        </div>
    </div>

    <div class="header-right">
        <a href="https://www.instagram.com/obenisburguer?igsh=MTBpaWl5NnY2bzBheA==" target="_blank">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="https://wa.me/5569993668336" target="_blank">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>
</header>

<section class="hero">
    🔥 Chapa quente, sabor único!
</section>

<section class="menu">
    <h2>Cardápio</h2>
    <div id="products"></div>
</section>

<!-- CARRINHO -->
<div class="cart-button" onclick="toggleCart()">
    <i class="fas fa-shopping-cart"></i>
    <span id="cart-count">0</span>
</div>

<div class="cart-modal" id="cart-modal">
    <div class="cart-content">
        <h3>Seu Pedido</h3>
        <div id="cart-items"></div>
        <p class="total">Total: R$ <span id="total">0.00</span></p>
        <button onclick="checkout()">Finalizar Pedido</button>
        <button class="close" onclick="toggleCart()">Fechar</button>
    </div>
</div>

<!-- MAPA -->
<section class="map-section">
    <h2>📍 Nossa Localização</h2>
    <iframe 
        src="https://www.google.com/maps?q=R.+Paulo+Fortes,+6245+-+Aponiã,+Porto+Velho+-+RO&output=embed">
    </iframe>
</section>

<footer>
    <p>📍 R. Paulo Fortes, 6245 - Aponiã - Porto Velho/RO</p>
    <p>📞 (69) 9 9366-8336</p>
</footer>

<script src="script.js"></script>
</body>
</html>
