<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benis Burguer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/4b8b59b6f0.js" crossorigin="anonymous"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <div class="logo-area">
        <img src="logo.png">
        <div>
            <h1>Benis Burguer</h1>
            <p>🍔 Delivery • Terça a Domingo 19h às 23h59</p>
        </div>
    </div>

    <div class="social-icons">
        <a href="https://www.instagram.com/obenisburguer?igsh=MTBpaWl5NnY2bzBheA==" target="_blank">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="https://wa.me/5569993668336" target="_blank">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>
</header>

<section class="banner">
    🔥 Chapa quente, sabor único!
</section>

<nav class="categories">
    <button onclick="filterCategory('lanches')">🍔 Lanches</button>
    <button onclick="filterCategory('porcoes')">🍟 Porções</button>
    <button onclick="filterCategory('bebidas')">🥤 Bebidas</button>
</nav>

<section class="menu">
    <div id="products"></div>
</section>

<!-- Carrinho -->
<div class="cart-btn" onclick="toggleCart()">
    <i class="fas fa-shopping-bag"></i>
    <span id="cart-count">0</span>
</div>

<div class="cart-panel" id="cart-panel">
    <h2>Seu Pedido</h2>
    <div id="cart-items"></div>
    <div class="cart-total">
        Total: R$ <span id="total">0.00</span>
    </div>
    <button onclick="checkout()">Finalizar no WhatsApp</button>
</div>

<section class="map">
    <h2>📍 Localização</h2>
    <iframe src="https://www.google.com/maps?q=R.+Paulo+Fortes,+6245+-+Aponiã,+Porto+Velho+-+RO&output=embed"></iframe>
</section>

<footer>
    <p>R. Paulo Fortes, 6245 - Aponiã - Porto Velho/RO</p>
    <p>(69) 9 9366-8336</p>
</footer>

<script src="script.js"></script>
</body>
</html>
