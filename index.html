<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benis Burguer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/4b8b59b6f0.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
    <img src="logo.png">
</div>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-box">
        <h2>Entrar</h2>
        <input type="text" id="username" placeholder="Seu nome">
        <button onclick="login()">Entrar</button>
    </div>
</div>

<div id="app" style="display:none">

<header class="topbar">
    <div class="logo-area">
        <img src="logo.png" class="logo">
        <div>
            <h1>Benis Burguer</h1>
            <p>🍔 Delivery • Terça a Domingo 19h às 23h59</p>
        </div>
    </div>

    <div class="social-icons">
        <a href="https://www.instagram.com/obenisburguer?igsh=MTBpaWl5NnY2bzBheA==" target="_blank">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="https://wa.me/5569993668336" target="_blank">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>
</header>

<section class="banner">
    🔥 Chapa quente, sabor único!
</section>

<section class="menu">
    <div id="products"></div>
</section>

<div class="cart-btn" onclick="toggleCart()">
<i class="fas fa-shopping-cart"></i>
<span id="cart-count">0</span>
</div>

<div class="cart-panel" id="cart-panel">
<h2>Seu Pedido</h2>

<input type="text" id="coupon" placeholder="Cupom de desconto">
<button onclick="applyCoupon()">Aplicar Cupom</button>

<div id="cart-items"></div>
<div class="cart-total">
Total: R$ <span id="total">0.00</span>
</div>
<button onclick="checkout()">Finalizar Pedido</button>
</div>

<a href="https://wa.me/5569993668336" class="whatsapp-float" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<script src="script.js"></script>
</div>

</body>
</html>
