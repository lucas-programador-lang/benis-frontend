<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Admin - Benis Burguer</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:20px;
}

h1{
color:#ff9800;
}

.dashboard{
display:flex;
gap:20px;
margin-bottom:20px;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:10px;
flex:1;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:#1c1c1c;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
text-align:center;
}

button{
background:#ff9800;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🍔 Painel Admin - Benis Burguer</h1>

<div class="dashboard">

<div class="card">
<h3>Total de Pedidos</h3>
<p id="totalPedidos">0</p>
</div>

<div class="card">
<h3>Faturamento</h3>
<p id="faturamento">R$ 0</p>
</div>

</div>


<h2>Pedidos em tempo real</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>Cliente</th>
<th>Total</th>
<th>Status</th>
<th>Ação</th>

</tr>

</thead>

<tbody id="pedidos"></tbody>

</table>


<script src="admin.js"></script>

</body>

</html>
